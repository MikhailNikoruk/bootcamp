<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта спортивных площадок Москвы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d2d47 100%);
            min-height: 100vh;
            color: #ffd700;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(100, 200, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 0;
            background: linear-gradient(135deg, #ff6b6b, #ffd700, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        /* Карта */
        .map-container {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.8), rgba(48, 25, 80, 0.8));
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(255, 107, 107, 0.25), 0 0 20px rgba(78, 205, 196, 0.15);
            position: relative;
            padding: 15px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .map-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Районы */
        #districtsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        /* Виды спорта */
        #sportsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .sport-btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, rgba(100, 100, 200, 0.3), rgba(100, 50, 150, 0.3));
            border: 2px solid rgba(255, 107, 107, 0.4);
            border-radius: 10px;
            color: #4ecdc4;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .sport-btn:hover {
            border-color: #ffd700;
            color: #ffd700;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3), rgba(255, 215, 0, 0.2));
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
        }

        .sport-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            border-color: #ffd700;
            color: #0a0e27;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        /* Площадки */
        #stadiumsContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stadium-card {
            background: linear-gradient(135deg, rgba(48, 80, 140, 0.4), rgba(70, 40, 120, 0.4));
            border: 2px solid rgba(78, 205, 196, 0.3);
            border-left: 5px solid rgba(78, 205, 196, 0.6);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .stadium-card:hover {
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.2), rgba(255, 215, 0, 0.1));
            border-color: #4ecdc4;
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.3);
        }

        .stadium-card.active {
            border-color: #ffd700;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(78, 205, 196, 0.15));
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            border-left-color: #ffd700;
        }

        .stadium-card-name {
            font-size: 14px;
            font-weight: 600;
            color: #4ecdc4;
            margin-bottom: 4px;
        }

        .stadium-card-address {
            font-size: 12px;
            color: #7dd3ff;
        }

        .occupancy-badge {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #0a0e27;
            min-width: 100px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(100, 100, 200, 0.3);
        }

        /* Панель справа */
        .sidebar {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.8), rgba(48, 25, 80, 0.8));
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 40px rgba(78, 205, 196, 0.25), 0 0 20px rgba(255, 107, 107, 0.15);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            text-align: center;
        }

        .info-block {
            background: linear-gradient(135deg, rgba(100, 100, 200, 0.2), rgba(100, 50, 150, 0.2));
            border: 2px solid rgba(78, 205, 196, 0.3);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .info-label {
            font-size: 11px;
            color: #7dd3ff;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .info-value {
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(90deg, #4ecdc4, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            word-break: break-all;
        }

        .occupancy-bar {
            background: rgba(100, 100, 150, 0.4);
            height: 10px;
            border-radius: 5px;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .occupancy-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd700, #4ecdc4);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* Выбор времени */
        .time-section {
            margin-top: 10px;
        }

        .time-label {
            font-size: 11px;
            color: #7dd3ff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .time-slot {
            background: linear-gradient(135deg, rgba(100, 100, 200, 0.3), rgba(100, 50, 150, 0.3));
            border: 2px solid rgba(78, 205, 196, 0.4);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #4ecdc4;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .time-slot:hover:not(:disabled) {
            border-color: #ffd700;
            color: #ffd700;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(78, 205, 196, 0.1));
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.3);
        }

        .time-slot.selected {
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            border-color: #ffd700;
            color: #0a0e27;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .time-slot:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: rgba(78, 205, 196, 0.15);
        }

        /* Кнопки */
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            color: #0a0e27;
            border: 2px solid rgba(255, 215, 0, 0.5);
            font-weight: 700;
        }

        .btn-confirm:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-confirm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-reset {
            background: transparent;
            color: #4ecdc4;
            border: 2px solid rgba(78, 205, 196, 0.5);
        }

        .btn-reset:hover {
            border-color: #ffd700;
            color: #ffd700;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(78, 205, 196, 0.05));
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }

        /* Результат */
        .result {
            display: none;
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1), rgba(255, 215, 0, 0.08));
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 12px;
            margin-top: 10px;
            backdrop-filter: blur(5px);
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            font-size: 14px;
            color: #7dd3ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-code {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        .result-text {
            font-size: 12px;
            color: #4ecdc4;
            font-weight: 600;
        }

        /* Скролл */
        .time-grid::-webkit-scrollbar {
            width: 6px;
        }

        .time-grid::-webkit-scrollbar-track {
            background: rgba(100, 100, 150, 0.2);
            border-radius: 3px;
        }

        .time-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff6b6b, #ffd700);
            border-radius: 3px;
        }

        /* Адаптивность */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .map-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .map-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .header h1 {
                font-size: 24px;
            }

            .time-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .map-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 20px;
            }

            .stadium-emoji {
                font-size: 24px;
            }

            .time-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Скролл */
        .time-grid::-webkit-scrollbar {
            width: 6px;
        }

        .time-grid::-webkit-scrollbar-track {
            background: #0f3460;
            border-radius: 3px;
        }

        .time-grid::-webkit-scrollbar-thumb {
            background: #457b9d;
            border-radius: 3px;
        }
    </style>
</head>

                    ],
                    'basketball': [
                        { id: 66, name: 'Баскет-холл Ростокино', address: 'ул. Ростовская, д. 8', occupancy: 70, count: 35 },
                        { id: 67, name: 'Спортклуб ВДНХ', address: 'Проспект Мира, д. 188', occupancy: 60, count: 30 }
                    ]
                }
            }
        };

        const sportLabels = {
            'football': '⚽ Футбол',
            'basketball': '🏀 Баскетбол',
            'tennis': '🎾 Теннис',
            'volleyball': '🏐 Волейбол',
            'hockey': '🏒 Хоккей',
            'baseball': '⚾ Бейсбол',
            'running': '🏃 Бег'
        };

        // Временные слоты
        const timeSlots = [
            '08:00', '09:00', '10:00', '11:00', '12:00', '13:00',
            '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00'
        ];

        // Состояние
        let state = {
            selectedDistrict: null,
            selectedSport: null,
            selectedStadium: null,
            selectedTime: null
        };

        // Контроль максимума людей
        const MAX_OCCUPANCY = 50;

        // Функция для определения цвета по загруженности
        function getOccupancyColor(occupancy) {
            if (occupancy < 30) return '#2ecc71'; // Зелёный - свободно
            if (occupancy < 60) return '#f39c12'; // Жёлтый - средне
            return '#e74c3c'; // Красный - переполнено
        }

        // Инициализация
        function init() {
            renderDistricts();
            renderTimeSlots();
        }

        // Рисуем кнопки районов
        function renderDistricts() {
            const container = document.getElementById('districtsContainer');
            container.innerHTML = '';
            
            Object.entries(districts).forEach(([key, district]) => {
                const btn = document.createElement('button');
                btn.className = 'sport-btn' + (state.selectedDistrict === key ? ' active' : '');
                btn.textContent = district.name;
                btn.onclick = () => selectDistrict(key);
                container.appendChild(btn);
            });
        }

        // Выбор района
        function selectDistrict(districtKey) {
            state.selectedDistrict = districtKey;
            state.selectedSport = null;
            state.selectedStadium = null;
            state.selectedTime = null;
            
            document.getElementById('selectedDistrict').textContent = districts[districtKey].name;
            document.getElementById('selectedSportLabel').textContent = '-';
            document.getElementById('selectedStadiumLabel').textContent = '-';
            document.getElementById('occupancyText').textContent = '-';
            document.getElementById('occupancyFill').style.width = '0%';
            
            renderDistricts();
            renderSports();
            resetStadiums();
            document.getElementById('confirmBtn').disabled = true;
        }

        // Рисуем виды спорта
        function renderSports() {
            const container = document.getElementById('sportsContainer');
            container.innerHTML = '';
            
            if (!state.selectedDistrict) {
                container.innerHTML = '<div style="color: #7a8fa5; text-align: center; padding: 20px;">Выберите район</div>';
                return;
            }
            
            const sports = districts[state.selectedDistrict].sports;
            Object.entries(sports).forEach(([key, venues]) => {
                if (venues.length === 0) return;
                
                const btn = document.createElement('button');
                btn.className = 'sport-btn' + (state.selectedSport === key ? ' active' : '');
                btn.textContent = sportLabels[key];
                btn.onclick = () => selectSport(key);
                container.appendChild(btn);
            });
        }

        // Выбор вида спорта
        function selectSport(sportKey) {
            state.selectedSport = sportKey;
            state.selectedStadium = null;
            state.selectedTime = null;
            
            document.getElementById('selectedSportLabel').textContent = sportLabels[sportKey];
            document.getElementById('selectedStadiumLabel').textContent = '-';
            document.getElementById('occupancyText').textContent = '-';
            document.getElementById('occupancyFill').style.width = '0%';
            
            renderSports();
            renderStadiums();
            document.getElementById('confirmBtn').disabled = true;
        }

        // Рисуем площадки
        function renderStadiums() {
            const container = document.getElementById('stadiumsContainer');
            container.innerHTML = '';
            
            if (!state.selectedDistrict || !state.selectedSport) {
                container.innerHTML = '<div style="color: #7a8fa5; text-align: center; padding: 20px;">Выберите вид спорта</div>';
                return;
            }
            
            const venues = districts[state.selectedDistrict].sports[state.selectedSport] || [];
            
            venues.forEach(venue => {
                const color = getOccupancyColor(venue.occupancy);
                const card = document.createElement('div');
                card.className = 'stadium-card' + (state.selectedStadium?.id === venue.id ? ' active' : '');
                card.style.borderLeftColor = color;
                card.innerHTML = `
                    <div style="flex: 1;">
                        <div class="stadium-card-name">${venue.name}</div>
                        <div class="stadium-card-address">${venue.address}</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="occupancy-badge" style="background-color: ${color};">
                            ${venue.occupancy}% (${venue.count}/${MAX_OCCUPANCY})
                        </div>
                    </div>
                `;
                card.onclick = () => selectStadium(venue);
                container.appendChild(card);
            });
        }

        // Выбор площадки
        function selectStadium(venue) {
            state.selectedStadium = venue;
            state.selectedTime = null;
            
            document.getElementById('selectedStadiumLabel').textContent = venue.name;
            document.getElementById('occupancyFill').style.width = venue.occupancy + '%';
            document.getElementById('occupancyText').textContent = venue.occupancy + '% (' + venue.count + '/' + MAX_OCCUPANCY + ')';
            
            renderStadiums();
            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
            renderTimeSlots();
            document.getElementById('confirmBtn').disabled = true;
        }

        // Рисуем время
        function renderTimeSlots() {
            const grid = document.getElementById('timeGrid');
            grid.innerHTML = '';
            
            timeSlots.forEach(time => {
                const element = document.createElement('button');
                element.className = 'time-slot';
                element.textContent = time;
                element.disabled = !state.selectedStadium;
                element.onclick = () => selectTime(time, element);
                grid.appendChild(element);
            });
        }

        // Выбор времени
        function selectTime(time, element) {
            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
            element.classList.add('selected');
            
            state.selectedTime = time;
            
            if (state.selectedDistrict && state.selectedSport && state.selectedStadium && state.selectedTime) {
                document.getElementById('confirmBtn').disabled = false;
            }
        }

        // Сброс площадок
        function resetStadiums() {
            document.getElementById('stadiumsContainer').innerHTML = '';
        }

        // Подтверждение
        function confirmBooking() {
            if (!state.selectedDistrict || !state.selectedSport || !state.selectedStadium || !state.selectedTime) {
                alert('Выберите все параметры!');
                return;
            }
            
            const code = 'BR' + Date.now().toString().slice(-8);
            const districtName = districts[state.selectedDistrict].name;
            
            document.getElementById('resultCode').textContent = code;
            document.getElementById('resultBlock').classList.add('show');
            
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            bookings.push({
                code: code,
                district: districtName,
                sport: sportLabels[state.selectedSport],
                stadium: state.selectedStadium.name,
                address: state.selectedStadium.address,
                time: state.selectedTime,
                date: new Date().toLocaleString('ru-RU')
            });
            localStorage.setItem('bookings', JSON.stringify(bookings));
        }

        // Сброс
        function resetSelection() {
            state = {
                selectedDistrict: null,
                selectedSport: null,
                selectedStadium: null,
                selectedTime: null
            };
            
            document.getElementById('sportsContainer').innerHTML = '';
            document.getElementById('stadiumsContainer').innerHTML = '';
            document.getElementById('resultBlock').classList.remove('show');
            document.getElementById('confirmBtn').disabled = true;
            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
            
            renderDistricts();
        }

        // Запуск
        window.addEventListener('load', init);
    </script>
</body>
</html>
